steps:
# 1. Pull previous image as cache (ignore failure on first build).
- name: 'gcr.io/cloud-builders/docker'
  entrypoint: 'bash'
  args: ['-c', 'docker pull us-central1-docker.pkg.dev/$PROJECT_ID/pronunciation-engine/api:latest || exit 0']

# 2. Build the new image, using the pulled image as cache.
- name: 'gcr.io/cloud-builders/docker'
  args: [
    'build',
    '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/pronunciation-engine/api:latest',
    '--cache-from', 'us-central1-docker.pkg.dev/$PROJECT_ID/pronunciation-engine/api:latest',
    '.'
  ]

# 3. Push.
- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/pronunciation-engine/api:latest']

images:
- 'us-central1-docker.pkg.dev/$PROJECT_ID/pronunciation-engine/api:latest'

# The Wav2Vec2 model + torch install are heavy — give the build enough time
# and CPU. E2_HIGHCPU_8 completes in ~10–15 min; default machines time out.
options:
  machineType: 'E2_HIGHCPU_8'

timeout: '1800s'
